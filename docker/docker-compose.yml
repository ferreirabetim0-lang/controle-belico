version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: controle-belico-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-controlebelico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
      POSTGRES_DB: ${POSTGRES_DB:-controlebelico}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - controle-belico-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlebelico"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: controle-belico-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - controle-belico-net

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio
    container_name: controle-belico-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-controlebelico}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopassword}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - controle-belico-net

  # Backend NestJS
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: controle-belico-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-controlebelico}:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/${POSTGRES_DB:-controlebelico}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-controlebelico}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniopassword}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - controle-belico-net

  # Frontend Next.js
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: controle-belico-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - controle-belico-net

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: controle-belico-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - controle-belico-net

networks:
  controle-belico-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
